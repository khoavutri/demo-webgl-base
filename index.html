<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>webgl-base</title>
    <style>
      /* .flex {
        width: 300px;
        display: flex;
        width: 100%;
        justify-content: space-between;
      } */
      .an {
        display: none;
      }
    </style>
    <script src="./index.js"></script>
  </head>
  <body>
    <canvas id="canvas" height="450" width="600"></canvas>
    <div class="flex an">
      <span>cameraA:</span>
      <input type="range" id="cameraAngle" min="-90" max="90" value="0" />
    </div>
    <div class="flex">
      <span>fieldOfV:</span>
      <input
        type="range"
        id="fieldOfView"
        min="0"
        max="179"
        value="90"
        step="0.1"
      />
    </div>
    <div class="flex">
      <span>x:</span>
      <input type="range" id="x" min="-750" max="750" value="0" />
    </div>
    <div class="flex">
      <span>Y:</span>
      <input type="range" id="y" min="-600" max="600" value="0" />
    </div>
    <div class="flex">
      <span>Z:</span>
      <input type="range" id="z" min="-1000" max="1000" value="0" />
    </div>
    <div class="flex">
      <span>AngleX:</span>
      <input type="range" id="angleX" min="-360" max="360" value="0" />
    </div>
    <div class="flex">
      <span>AngleY:</span>
      <input type="range" id="angleY" min="-360" max="360" value="0" />
    </div>
    <div class="flex">
      <span>AngleZ:</span>
      <input type="range" id="angleZ" min="-360" max="360" value="0" />
    </div>
    <div class="flex">
      <span>scaleX:</span>
      <input type="range" id="scaleX" min="0.1" max="5" value="1" step="0.01" />
    </div>
    <div class="flex">
      <span>scaleY:</span>
      <input type="range" id="scaleY" min="0.1" max="5" value="1" step="0.01" />
    </div>
    <div class="flex">
      <span>scaleZ:</span>
      <input type="range" id="scaleZ" min="0.1" max="5" value="1" step="0.01" />
    </div>
    <div class="flex">
      <span>lightX:</span>
      <input type="range" id="lightX" min="-5" max="5" value="-1" step="0.01" />
    </div>
    <div class="flex">
      <span>lightY:</span>
      <input type="range" id="lightY" min="-5" max="5" value="-1" step="0.01" />
    </div>
    <div class="flex">
      <span>lightZ:</span>
      <input type="range" id="lightZ" min="-5" max="5" value="-1" step="0.01" />
    </div>
    <div class="flex">
      <span>shininess:</span>
      <input
        type="range"
        id="shininess"
        min="1"
        max="360"
        value="150"
        step="1"
      />
    </div>
  </body>
</html>
